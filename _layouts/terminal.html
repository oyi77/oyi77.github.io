<!DOCTYPE html>
<html lang="en" itemscope itemtype="https://schema.org/Person">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Primary Meta Tags -->
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <meta name="title" content="{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}">
    <meta name="description"
        content="{% if page.description %}{{ page.description }}{% else %}{{ site.description }}{% endif %}">
    <meta name="keywords" content="{{ site.keywords }}{% if page.tags %}, {{ page.tags | join: ', ' }}{% endif %}">
    <meta name="author" content="{{ site.author.name }}">
    <meta name="robots" content="index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1">
    <meta name="language" content="English">
    <meta name="theme-color" content="#050510">
    <link rel="canonical" href="{{ site.url }}{{ site.baseurl }}{{ page.url }}">

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="profile">
    <meta property="og:url" content="{{ site.url }}{{ site.baseurl }}{{ page.url }}">
    <meta property="og:title" content="{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}">
    <meta property="og:description"
        content="{% if page.description %}{{ page.description }}{% else %}{{ site.description }}{% endif %}">
    <meta property="og:image" content="{{ site.url }}{{ site.baseurl }}/assets/images/bio-photo.png">
    <meta property="og:image:width" content="1200">
    <meta property="og:image:height" content="630">
    <meta property="og:site_name" content="{{ site.title }}">
    <meta property="og:locale" content="en_US">
    <meta property="profile:username" content="oyi77">

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:url" content="{{ site.url }}{{ site.baseurl }}{{ page.url }}">
    <meta name="twitter:title" content="{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}">
    <meta name="twitter:description"
        content="{% if page.description %}{{ page.description }}{% else %}{{ site.description }}{% endif %}">
    <meta name="twitter:image" content="{{ site.url }}{{ site.baseurl }}/assets/images/bio-photo.png">
    {% if site.twitter_username %}
    <meta name="twitter:creator" content="@{{ site.twitter_username }}">{% endif %}
    <meta name="twitter:site" content="@{{ site.github_username }}">

    <!-- Additional SEO -->
    <meta name="geo.region" content="SEA">
    <meta name="geo.placename" content="Southeast Asia">
    <meta name="application-name" content="OYI Terminal OS">
    <meta name="apple-mobile-web-app-title" content="OYI OS">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <!-- Schema.org Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Person",
      "name": "{{ site.author.name }}",
      "url": "{{ site.url }}{{ site.baseurl }}",
      "image": "{{ site.url }}{{ site.baseurl }}/assets/images/bio-photo.png",
      "sameAs": [
        "https://github.com/{{ site.github_username }}",
        "https://linktr.ee/jokogendeng",
        "https://www.quora.com/profile/Paijo-43",
        "https://x.com/this_is_paijo",
        "https://medium.com/@oyi77",
        "https://oyi77.substack.com/",
        "https://dev.to/oyi77",
        "https://www.publish0x.com/cr4zydud3/",
        "https://github.com/jokogendeng77",
        "https://bitbucket.org/jokoGendeng",
        "https://bitbucket.org/oyi77/workspace/repositories/",
        "https://gitlab.com/oyi77"
      ],
      "jobTitle": "Lead Software Engineer",
      "worksFor": {
        "@type": "Organization",
        "name": "Remote Available"
      },
      "address": {
        "@type": "PostalAddress",
        "addressRegion": "Southeast Asia"
      },
      "alumniOf": {
        "@type": "EducationalOrganization",
        "name": "Institut Teknologi Sepuluh Nopember (ITS) Surabaya"
      },
      "knowsAbout": [
        "Software Engineering",
        "Full-Stack Development",
        "Blockchain Development",
        "Algorithmic Trading",
        "Python",
        "JavaScript",
        "React",
        "Node.js",
        "Team Leadership"
      ],
      "description": "{{ site.description }}"
    }
    </script>

    <!-- Website Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "{{ site.title }}",
      "url": "{{ site.url }}{{ site.baseurl }}",
      "description": "{{ site.description }}",
      "author": {
        "@type": "Person",
        "name": "{{ site.author.name }}"
      },
      "potentialAction": {
        "@type": "SearchAction",
        "target": "{{ site.url }}{{ site.baseurl }}/search?q={search_term_string}",
        "query-input": "required name=search_term_string"
      }
    }
    </script>

    <!-- Preconnect for Performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="dns-prefetch" href="https://cdn.jsdelivr.net">
    <link rel="dns-prefetch" href="https://api.github.com">

    <!-- Favicons -->
    <link rel="icon" type="image/x-icon" href="{{ site.baseurl }}/assets/images/favicons/favicon.ico">
    <link rel="icon" type="image/png" sizes="16x16" href="{{ site.baseurl }}/assets/images/favicons/favicon-16x16.png">
    <link rel="icon" type="image/png" sizes="32x32" href="{{ site.baseurl }}/assets/images/favicons/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="48x48" href="{{ site.baseurl }}/assets/images/favicons/favicon-48x48.png">
    <link rel="icon" type="image/png" sizes="64x64" href="{{ site.baseurl }}/assets/images/favicons/favicon-64x64.png">
    <link rel="icon" type="image/png" sizes="96x96" href="{{ site.baseurl }}/assets/images/favicons/favicon-96x96.png">
    <link rel="icon" type="image/png" sizes="128x128" href="{{ site.baseurl }}/assets/images/favicons/favicon-128x128.png">
    <link rel="icon" type="image/png" sizes="192x192" href="{{ site.baseurl }}/assets/images/favicons/favicon-192x192.png">
    <link rel="icon" type="image/png" sizes="256x256" href="{{ site.baseurl }}/assets/images/favicons/favicon-256x256.png">
    
    <!-- Apple Touch Icons -->
    <link rel="apple-touch-icon" sizes="57x57" href="{{ site.baseurl }}/assets/images/favicons/apple-touch-icon-57x57.png">
    <link rel="apple-touch-icon" sizes="72x72" href="{{ site.baseurl }}/assets/images/favicons/apple-touch-icon-72x72.png">
    <link rel="apple-touch-icon" sizes="76x76" href="{{ site.baseurl }}/assets/images/favicons/apple-touch-icon-76x76.png">
    <link rel="apple-touch-icon" sizes="114x114" href="{{ site.baseurl }}/assets/images/favicons/apple-touch-icon-114x114.png">
    <link rel="apple-touch-icon" sizes="120x120" href="{{ site.baseurl }}/assets/images/favicons/apple-touch-icon-120x120.png">
    <link rel="apple-touch-icon" sizes="144x144" href="{{ site.baseurl }}/assets/images/favicons/apple-touch-icon-144x144.png">
    <link rel="apple-touch-icon" sizes="152x152" href="{{ site.baseurl }}/assets/images/favicons/apple-touch-icon-152x152.png">
    <link rel="apple-touch-icon" sizes="180x180" href="{{ site.baseurl }}/assets/images/favicons/apple-touch-icon-180x180.png">
    
    <!-- Android Chrome Icons -->
    <link rel="icon" type="image/png" sizes="144x144" href="{{ site.baseurl }}/assets/images/favicons/android-chrome-144x144.png">
    <link rel="icon" type="image/png" sizes="192x192" href="{{ site.baseurl }}/assets/images/favicons/android-chrome-192x192.png">
    
    <!-- Windows Tiles -->
    <meta name="msapplication-TileImage" content="{{ site.baseurl }}/assets/images/favicons/mstile-144x144.png">
    <meta name="msapplication-TileColor" content="#0d0d0d">
    
    <!-- Web Manifest -->
    <link rel="manifest" href="{{ site.baseurl }}/site.webmanifest">

    <!-- Sitemap -->
    <link rel="sitemap" type="application/xml" href="{{ site.url }}{{ site.baseurl }}/sitemap.xml">

    <!-- Fonts -->
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&family=JetBrains+Mono:wght@400;700&display=swap"
        rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.css" />
    <link rel="stylesheet" href="{{ '/assets/css/style_v2.css' | relative_url }}">

    <!-- Scripts (Head) -->
    <script src="https://cdn.jsdelivr.net/npm/xterm@5.3.0/lib/xterm.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xterm-addon-fit@0.8.0/lib/xterm-addon-fit.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xterm-addon-web-links@0.9.0/lib/xterm-addon-web-links.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xterm-addon-search@0.13.0/lib/xterm-addon-search.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xterm-addon-unicode11@0.5.0/lib/xterm-addon-unicode11.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xterm-addon-serialize@0.7.0/lib/xterm-addon-serialize.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xterm-addon-image@0.5.0/lib/xterm-addon-image.js"></script>



    <!-- Jekyll Data Injection -->
    <script>
        window.JEKYLL_DATA = {
            site: {
                title: "{{ site.title | default: 'Lead Software Engineer | Remote Available' }}",
                description: "{{ site.description | default: '' }}",
                github_username: "{{ site.github_username | default: 'oyi77' }}",
                baseurl: "{{ site.baseurl | default: '' }}"
            },
            terminal: {{ site.data.terminal | jsonify }},
            companies: {{ site.data.companies | jsonify | default: 'null' }},
            projects: {{ site.data.projects | jsonify | default: 'null' }},
            case_studies: {{ site.data.case_studies | jsonify | default: 'null' }},
            led_projects: {{ site.data.led_projects | jsonify | default: 'null' }},
            approaches: {{ site.data.approaches | jsonify | default: 'null' }},
            repository_stats: {{ site.data.repository_stats | jsonify | default: 'null' }},
            skills_matrix: {{ site.data.skills_matrix | jsonify | default: 'null' }},
            timeline: {{ site.data.timeline | jsonify | default: 'null' }},
            github_stats: {{ site.data.github_stats | jsonify | default: 'null' }},
            metrics: {{ site.data.metrics | jsonify | default: 'null' }},
            analytics: {{ site.data.analytics | jsonify | default: 'null' }},
            seo: {{ site.data.seo | jsonify | default: 'null' }},
            external_stats: {{ site.data.external_stats | jsonify | default: 'null' }},
            market_data: {{ site.data.market_data | jsonify | default: 'null' }}
        };
    </script>
</head>

<body class="fullscreen-terminal" itemscope itemtype="https://schema.org/Person">

    <!-- Modern UI Overlay -->
    <div id="ui-overlay">
        <!-- Sidebar Navigation -->
        <aside id="sidebar" role="navigation" aria-label="Main navigation">
            <div class="sidebar-header">
                <h2 class="logo" itemprop="name">OYI OS</h2>
            </div>
            <nav class="sidebar-nav">
                <div class="nav-group">
                    <span class="nav-label">SYSTEM</span>
                    <a href="/" class="nav-item home-link">HOME</a>
                    <button class="nav-item" onclick="terminalOS.handleCommand('whoami')">WHOAMI</button>
                    <button class="nav-item" onclick="terminalOS.handleCommand('sysmon')">SYSMON</button>
                    <button class="nav-item" onclick="terminalOS.handleCommand('netmap')">NETMAP</button>
                </div>
                <div class="nav-group">
                    <span class="nav-label">LOGS</span>
                    <button class="nav-item" onclick="terminalOS.handleCommand('companies')">COMPANIES</button>
                    <button class="nav-item" onclick="terminalOS.handleCommand('repos')">REPOS</button>
                    <button class="nav-item" onclick="terminalOS.handleCommand('cv')">CV</button>
                </div>
                <div class="nav-group">
                    <span class="nav-label">TOOLS</span>
                    <button class="nav-item" onclick="terminalOS.handleCommand('hack')">HACK</button>
                    <button class="nav-item" onclick="terminalOS.handleCommand('wallet')">WALLET</button>
                    <button class="nav-item" onclick="terminalOS.handleCommand('market')">MARKET</button>
                </div>
            </nav>
            <div class="sidebar-footer">
                <span class="status-indicator"></span>
                <span class="status-text">ONLINE</span>
            </div>
        </aside>

        <!-- Main Content Area -->
        <main id="main-content" role="main">
            <header id="top-bar" role="banner">
                <div class="top-bar-left">
                    <span class="path-display" aria-label="Current directory path">guest@oyi-os:~</span>
                </div>
                <div class="top-bar-right">
                    <div class="stat-item">
                        <span class="stat-icon">UP:</span>
                        <span id="uptime-display">0S</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-icon">THREAT:</span>
                        <span class="threat-level low">LOW</span>
                    </div>
                </div>
            </header>

            <div id="terminal-container" class="terminal-fullscreen">
                <div id="terminal" role="application" aria-label="Interactive terminal emulator" aria-live="polite">
                </div>
            </div>
        </main>
    </div>

    <!-- Terminal Core Scripts -->
    <script src="{{ '/assets/js/terminal/utils.js' | relative_url }}"></script>

    <script src="{{ '/assets/js/terminal/filesystem-loader.js' | relative_url }}"></script>
    <script src="{{ '/assets/js/terminal/apps/github-explorer.js' | relative_url }}"></script>
    <script src="{{ '/assets/js/terminal/apps/install.js' | relative_url }}"></script>

    <script src="{{ '/assets/js/terminal/apps/help.js' | relative_url }}"></script>

    <script src="{{ '/assets/js/terminal/apps/companies.js' | relative_url }}"></script>
    <script src="{{ '/assets/js/terminal/apps/achievements.js' | relative_url }}"></script>
    <script src="{{ '/assets/js/terminal/apps/repos.js' | relative_url }}"></script>
    <script src="{{ '/assets/js/terminal/apps/sysmon.js' | relative_url }}"></script>
    <script src="{{ '/assets/js/terminal/apps/netmap.js' | relative_url }}"></script>
    <script src="{{ '/assets/js/terminal/apps/neofetch.js' | relative_url }}"></script>
    <script src="{{ '/assets/js/terminal/apps/skills.js' | relative_url }}"></script>
    <script src="{{ '/assets/js/terminal/apps/wallet.js' | relative_url }}"></script>
    <script src="{{ '/assets/js/terminal/apps/cv.js' | relative_url }}"></script>

    <script src="{{ '/assets/js/terminal/core.js' | relative_url }}"></script>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            // Ensure FitAddon is available
            if (typeof FitAddon !== 'undefined' && !window.FitAddon.FitAddon) {
                window.FitAddon = { FitAddon: FitAddon };
            }

            // Ensure Terminal is available
            console.log('Terminal check:', typeof Terminal, typeof window.Terminal);
            if (typeof Terminal === 'undefined' && typeof window.Terminal === 'undefined') {
                console.error('Xterm.js (Terminal) not loaded!');
                return;
            }

            // Initialize Terminal OS
            const terminalOS = new TerminalOS('terminal');
            window.terminalOS = terminalOS;
        });
    </script>

</html>
