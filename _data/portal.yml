# Portal Homepage Configuration
# Single source of truth for metrics, achievements, and section content
# Auto-consumed by index.html (Liquid) and portal.js (via JEKYLL_DATA)
# Update this file to update the portal homepage - no JS/HTML edits needed.

# --- Metrics Dashboard (top-level numbers) ---
metrics:
  - value: 7
    label: "Years Experience"
  - value: 3000
    label: "Team Members Led"
  - value: 4
    label: "Companies"
  - value: 8
    label: "Projects"
  - value: 90
    label: "Win Rate %"
  - value: 100
    label: "Revenue Impact (USD)"

# --- Achievement Highlights ---
achievements:
  - icon: "$"
    value: 100
    suffix: "K"
    unit: "USD"
    description: "Profit Generated (Fomo Watcher)"
  - icon: "team"
    value: 3000
    suffix: "+"
    description: "Team Members Led (GarudaMedia)"
  - icon: "%"
    value: 90
    suffix: "+"
    description: "Trading Win Rate (AiTradePulse)"
  - icon: "down"
    value: 40
    suffix: "+"
    description: "Cost Reduction (GarudaMedia)"
  - icon: "btc"
    value: 5
    suffix: "B+"
    unit: "IDR"
    description: "Monthly Volume (BerkahKarya)"

# --- Header ---
header:
  title: "System Entry"
  subtitle: "Lead Software Engineer"

# --- Access Cards ---
access_cards:
  - href: "/terminal"
    label: "TIER 01 - CORE_KERNEL"
    title: "OYI Terminal OS"
    description: "Low-level access to achievements, company logs, and technical skills via interactive terminal."
    footer: "Execute OS"
    aria_label: "Access Terminal OS - Interactive portfolio terminal"
  - href: "/oyi77"
    label: "TIER 02 - GRAPHICAL_UI"
    title: "One Piece cvOS"
    description: "High-level graphical interface showcasing creative engineering and interactive storytelling."
    footer: "Launch GUI"
    aria_label: "Access Graphical CV OS - One Piece themed portfolio"
  - href: "/assets/pdf/CV.pdf"
    label: "TIER 03 - DIRECT_ACCESS"
    title: "Fast Track CV"
    description: "Immediate access to professional credentials. Optimized for recruiters and hiring managers."
    footer: "Download PDF"
    aria_label: "Download CV PDF - Professional resume"
    download: true

# --- Portfolio Cards ---
portfolio_cards:
  - section: "posts"
    icon: "[ ]"
    title: "Posts"
    description: "Technical articles, insights, and thought leadership on software engineering."
  - section: "achievements"
    icon: "*"
    title: "Achievements"
    description: "Notable accomplishments, awards, and recognitions throughout my career."
  - section: "experience"
    icon: "+"
    title: "Experience"
    description: "Professional journey spanning 7+ years in software engineering and technical leadership."
  - section: "projects"
    icon: "#"
    title: "Projects"
    description: "Portfolio of significant projects including blockchain, trading systems, and enterprise solutions."
  - section: "skills"
    icon: ">"
    title: "Skills"
    description: "Technical expertise across full-stack development, blockchain, cloud infrastructure, and more."
  - section: "about"
    icon: "@"
    title: "About Me"
    description: "Background, philosophy, and approach to software engineering and problem-solving."
  - section: "certifications"
    icon: "~"
    title: "Certifications"
    description: "Professional certifications and continuous learning achievements."
  - section: "leadership"
    icon: "^"
    title: "Leadership"
    description: "Team leadership, mentorship, and organizational impact."
  - section: "case-studies"
    icon: "="
    title: "Case Studies"
    description: "In-depth analysis of complex problems solved and systems architected."
  - section: "examples"
    icon: "!"
    title: "Example Cases"
    description: "Real-world examples demonstrating technical expertise and problem-solving approach."

# --- Footer ---
footer:
  text: "SOFTWARE ENGINEER | TECHNICAL LEAD | REMOTE_READY"
