# Welcome to Jekyll!
#
# This config file is meant for settings that affect your whole blog, values
# which you are expected to set up once and rarely edit after that. If you find
# yourself editing this file very often, consider using Jekyll's data files
# feature for the data you need to update frequently.
#
# For technical reasons, this file is *NOT* reloaded automatically when you use
# 'bundle exec jekyll serve'. If you change this file, please restart the server process.

# Site settings
# These are used to personalize your new site. If you look in the HTML files,
# you will see them accessed via {{ site.title }}, {{ site.email }}, and so on.
# You can create any custom variable you would like, and they will be accessible
# in the templates via {{ site.myvariable }}.
title: "oyi77 • OSS Contributor & Builder"
email: xji1d0d1@oyi77.anonaddy.me
description: >- # this means to ignore newlines until "baseurl:"
  OSS Contributor & Builder — 1ai-skills (1282+ agent skills), PolyEdge trading bot, 
  contributor to OmniRoute, next.js, trpc, vuejs, prisma. 10y+ building for the open web.
  Interactive portfolio with terminal OS, live metrics, and project showcase.
twitter_username: 
github_username: oyi77
minimal_mistakes_skin: default
search: true

# SEO Settings
url: "https://oyi77.is-a.dev"
baseurl: ""

# SEO Keywords
keywords: "open source contributor, AI agent skills, developer tools, Python, JavaScript, TypeScript, OSS contributor, GitHub, trading bot, Polymarket, Kalshi, OSINT, AI infrastructure, Indonesia developer"

# Social Sharing
social:
  type: "Person"
  name: "Paijo (oyi77)"
  links:
    - "https://github.com/oyi77"
    - "https://medium.com/@oyi77"
    - "https://dev.to/oyi77"
    - "https://linkedin.com/in/fikriizzuddin"

# Build settings
markdown: kramdown
remote_theme: mmistakes/minimal-mistakes
# Outputting
permalink: /:categories/:title/
paginate: 5 # amount of posts to show
paginate_path: /page:num/
timezone: "Asia/Jakarta"

# Directory Structure:
# - _pages/          : Static pages (including resumes/)
# - _plugins/        : Categorized plugins (analytics/, data/, generators/, utils/)
# - assets/js/       : Organized JS (features/, widgets/, terminal/)
# - assets/pdf/      : PDF documents (CV.pdf)
# - features/        : Standalone feature pages (eye/, news/)
include:
  - _pages

# Exclude from processing.
# The following items will not be processed, by default. Create a custom list
# to override the default setting.
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor/bundle/
  - vendor/cache/
  - vendor/gems/
  - vendor/ruby/
  - _scripts/
  - openspec/
  - .opencode/

# Plugins (previously gems:)
plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jemoji
  - jekyll-include-cache

# Custom plugin configuration
asset_optimization: true
data_compression: true
analytics: false
analytics_provider: "none"

author:
  name   : "Paijo (oyi77)"
  avatar : "/assets/images/bio-photo.jpg"
  bio    : "OSS Contributor & Builder. Built 1ai-skills (1282+ agent skills), PolyEdge trading bot. Contributed to OmniRoute, next.js, trpc, vuejs, prisma. 10y+ of code, 149 repos."
  links:
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/oyi77"
    - label: "GitHub Profile"
      icon: "fas fa-fw fa-user"
      url: "https://github.com/oyi77/oyi77"
    - label: "Medium"
      icon: "fab fa-fw fa-medium"
      url: "https://medium.com/@oyi77"
    - label: "Dev.to"
      icon: "fab fa-fw fa-dev"
      url: "https://dev.to/oyi77"

footer:
